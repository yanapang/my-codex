name: npm Publish Fallback

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish from
        required: true
        default: v0.18.8
      expected_version:
        description: Expected package version
        required: true
        default: 0.18.8

permissions:
  contents: read

jobs:
  publish:
    name: Publish npm Package Without Provenance
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Verify expected version
        shell: bash
        run: |
          actual="$(node -p "require('./package.json').version")"
          test "$actual" = "${{ inputs.expected_version }}"
      - run: npm pack --dry-run
      - name: Publish without provenance after Fulcio outage
        run: npm publish --access public --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
