name: npm publish fallback 0.18.9

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish 0.18.9 without provenance during Fulcio outage
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.18.9
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Verify package version
        shell: bash
        run: |
          test "$(node -p "require('./package.json').version")" = "0.18.9"
          node dist/scripts/check-version-sync.js --tag v0.18.9 || npm run build && node dist/scripts/check-version-sync.js --tag v0.18.9
      - run: npm pack --dry-run
      - name: Publish without provenance fallback
        run: npm publish --access public --provenance=false
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
