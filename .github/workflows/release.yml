name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_DIST_VERSION: 0.31.0

jobs:
  verify-version-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/check-version-sync.mjs --tag "${GITHUB_REF_NAME}"

  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    needs: [verify-version-sync]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux musl toolchain
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      - name: Configure Linux musl environment
        if: runner.os == 'Linux'
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-musl)
              echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
              ;;
            aarch64-unknown-linux-musl)
              echo "CC_aarch64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
              ;;
          esac
      - name: Install cargo-dist
        shell: bash
        run: cargo install cargo-dist --locked --version "$CARGO_DIST_VERSION"
      - name: Build dist artifacts for target
        shell: bash
        run: dist build -a local --target "${{ matrix.target }}" --output-format=json > dist-build-${{ matrix.target }}.json
      - name: Upload target release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: |
            target/distrib/*
            dist-build-${{ matrix.target }}.json
          if-no-files-found: error

  publish-native-assets:
    name: Publish Native Assets
    runs-on: ubuntu-latest
    needs: [build-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: release-artifacts
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-dist
        run: cargo install cargo-dist --locked --version "$CARGO_DIST_VERSION"
      - name: Generate release manifest from cargo-dist plan
        shell: bash
        run: |
          dist plan --output-format=json > dist-plan.json
          mkdir -p release-assets
          find release-artifacts -type f \( -name '*.tar.xz' -o -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-assets/ \;
          node scripts/generate-native-release-manifest.mjs \
            --plan dist-plan.json \
            --artifacts-dir release-assets \
            --out release-assets/native-release-manifest.json \
            --release-base-url "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}" \
            --require-products "omx-explore-harness,omx-sparkshell"
      - name: Upload release asset bundle for follow-up jobs
        uses: actions/upload-artifact@v4
        with:
          name: native-release-assets
          path: release-assets/*
          if-no-files-found: error
      - name: Attach native assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_BODY.md
          files: release-assets/*
          fail_on_unmatched_files: true
      - name: Write release summary
        shell: bash
        run: |
          {
            echo '## Native Release Assets'
            echo ''
            echo 'Published release assets:'
            ls -1 release-assets | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"

  smoke-verify-native:
    name: Smoke Verify Native Assets
    runs-on: ubuntu-latest
    needs: [publish-native-assets]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: native-release-assets
          path: release-assets
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Verify release archives and manifest
        run: node scripts/verify-native-release-assets.mjs --manifest release-assets/native-release-manifest.json --artifacts-dir release-assets

  smoke-packed-install:
    name: Smoke Test Packed Global Install
    runs-on: ubuntu-latest
    needs: [smoke-verify-native]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: native-release-assets
          path: release-assets
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Smoke test packed install with hydrated native assets
        run: node scripts/smoke-packed-install.mjs --release-assets-dir release-assets

  older-linux-runtime-proof:
    name: Older Linux Runtime Proof
    runs-on: ubuntu-latest
    needs: [smoke-packed-install]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          name: native-release-assets
          path: release-assets
      - name: Verify Docker is available
        run: docker version
      - name: Run packed-install hydration smoke on older Linux runtime
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            node:20-bullseye \
            bash -lc 'npm ci && node scripts/smoke-packed-install.mjs --release-assets-dir ./release-assets --require-no-fallback'

  publish-npm:
    name: Publish npm Package
    runs-on: ubuntu-latest
    needs: [older-linux-runtime-proof]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: node scripts/check-version-sync.mjs --tag "${GITHUB_REF_NAME}"
      - run: npm pack --dry-run
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
