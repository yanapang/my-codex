name: npm fallback publish

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: true
        default: v0.18.10
      version:
        description: npm package version to publish
        required: true
        default: 0.18.10

permissions:
  contents: read

jobs:
  publish:
    name: Publish npm without provenance fallback
    runs-on: [self-hosted, Linux, X64, gajae-layofflabs-2]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - name: Guard version is not already published
        run: |
          if npm view "oh-my-codex@${{ inputs.version }}" version >/dev/null 2>&1; then
            echo "oh-my-codex@${{ inputs.version }} already exists on npm" >&2
            exit 1
          fi
      - name: Verify package version
        run: |
          node -e "const p=require('./package.json'); if (p.version !== process.env.EXPECTED_VERSION) { console.error(p.version); process.exit(1); }"
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
